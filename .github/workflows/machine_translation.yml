name: Machine translation

on:
  workflow_dispatch:
    inputs:
      target_languages:
        description: 'Target languages (comma-separated, e.g., "es,fr,ar"). Leave empty for all.'
        required: false
        type: string
        default: ''
      overwrite_existing:
        description: 'Overwrite existing translations'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run - do not create PR'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  # Supported language codes
  ALL_LANGUAGES: "ar,es,fa,fr,pt,ru,sw,zh"

jobs:
  machine_translate:
    name: Prepopulate translations with Google Translate
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_TRANSLATE_CREDENTIALS }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-cloud-translate polib babel flask-babel

      - name: Setup Google Cloud credentials
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcloud-credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-credentials.json" >> $GITHUB_ENV

      - name: Extract translatable strings
        run: |
          mkdir -p trendsearth_ui/i18n/translations
          pybabel extract -F babel.cfg -k _ -k _l -k _g -k gettext -k lazy_gettext -o trendsearth_ui/i18n/translations/messages.pot trendsearth_ui/

      - name: Determine target languages
        id: languages
        run: |
          if [ -z "${{ inputs.target_languages }}" ]; then
            echo "languages=$ALL_LANGUAGES" >> $GITHUB_OUTPUT
          else
            echo "languages=${{ inputs.target_languages }}" >> $GITHUB_OUTPUT
          fi

      - name: Run machine translation
        run: |
          python scripts/machine_translate.py \
            --source-lang en \
            --target-langs "${{ steps.languages.outputs.languages }}" \
            --pot-file trendsearth_ui/i18n/translations/messages.pot \
            --translations-dir trendsearth_ui/i18n/translations \
            ${{ inputs.overwrite_existing && '--overwrite' || '' }}

      - name: Create pull request
        if: ${{ !inputs.dry_run }}
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Prepopulate translations with machine translation"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: machine-translation-updates
          delete-branch: true
          title: "Prepopulate translations with machine translation"
          body: |
            ## Machine Translation Update

            This PR prepopulates translations using Google Cloud Translation API.

            ### Configuration
            - **Target languages**: ${{ steps.languages.outputs.languages }}
            - **Overwrite existing**: ${{ inputs.overwrite_existing }}

            ### Important Notes
            - Machine translations are provided as a starting point
            - Human review and editing is recommended before deployment
            - Original translations (if any) are preserved unless overwrite was enabled

            ### Languages Updated
            ${{ steps.languages.outputs.languages }}

            ---
            _This PR was automatically generated by the machine translation workflow._
          labels: |
            i18n
            machine-translation
            automated pr
          add-paths: |
            trendsearth_ui/i18n/translations/**/*.po

      - name: Check outputs
        if: ${{ !inputs.dry_run && steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run completed. No PR was created."
          echo "Changed files:"
          git diff --name-only
