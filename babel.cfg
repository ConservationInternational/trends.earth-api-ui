# Babel configuration file for string extraction
# Run: pybabel extract -F babel.cfg -k _l -k lazy_gettext -o trendsearth_ui/i18n/translations/messages.pot trendsearth_ui/

[python: trendsearth_ui/**.py]
encoding = utf-8

[jinja2: trendsearth_ui/**/templates/**.html]
encoding = utf-8
extensions = jinja2.ext.autoescape,jinja2.ext.with_
